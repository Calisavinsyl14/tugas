<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIMKES</title>
    <link rel="stylesheet" href="index.css" />
</head>

<body>

    <div class="sidebar">
        <h2>SIMKES</h2>
        <a href="index.html">Dashboard</a>
        <a href="pendaftaran.html">Pendaftaran</a>
        <a href="poli.html">Pemeriksaan Poli</a>
        <a href="farmasi.html">Farmasi</a>
        <a href="radiologi.html">Radiologi</a>
        <a href="laboratorium.html">Laboratorium</a>
        <a class="active" href="kasir.html">Kasir</a>
        <a href="login.html">Logout</a>
    </div>

    <div class="main">

        <div class="card">
            <h2>Pembayaran</h2>

            <input type="text" id="namaPasien" placeholder="Nama Pasien">
            <input type="number" id="totalBayar" placeholder="Total">

            <button onclick="tambahTransaksi()">Bayar</button>
        </div>

        <div class="card">
            <h2>Riwayat Transaksi</h2>

            <table border="1" width="100%">
                <thead>
                    <tr>
                        <th>Pasien</th>
                        <th>Total</th>
                        <th>Status</th>
                    </tr>
                </thead>

                <tbody id="tabelTransaksi">
                    <tr>
                        <td>Budi</td>
                        <td>100000</td>
                        <td>Lunas</td>
                    </tr>
                </tbody>
            </table>
        </div>

    </div>

    <script>
        function tambahTransaksi() {

            let pasien = document.getElementById("namaPasien").value;
            let total = document.getElementById("totalBayar").value;

            if (pasien === "" || total === "") {
                alert("Silakan isi semua data terlebih dahulu!");
                return;
            }

            let tabel = document.getElementById("tabelTransaksi");

            let barisBaru = `
                <tr>
                    <td>${pasien}</td>
                    <td>Rp ${parseInt(total).toLocaleString('id-ID')}</td>
                    <td>Lunas</td>
                </tr>
            `;

            tabel.innerHTML += barisBaru;
            document.getElementById("namaPasien").value = "";
            document.getElementById("totalBayar").value = "";
        }
    </script>

</body>

</html>
