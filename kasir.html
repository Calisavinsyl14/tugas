<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIMKES</title>
    <link rel="stylesheet" href="index.css">
</head>

<body>

    <div class="sidebar">
        <h2>SIMKES</h2>
        <a href="index.html">Dashboard</a>
        <a href="pendaftaran.html">Pendaftaran</a>
        <a href="poli.html">Pemeriksaan Poli</a>
        <a href="farmasi.html">Farmasi</a>
        <a href="radiologi.html">Radiologi</a>
        <a href="laboratorium.html">Laboratorium</a>
        <a class="active" href="kasir.html">Kasir</a>
        <a href="login.html">Logout</a>
    </div>

    <div class="main">

        <!-- Form Pembayaran -->
        <div class="card">
            <h2>Pembayaran</h2>

            <input type="text" id="namaPasien" placeholder="Nama Pasien">
            <input type="number" id="totalBayar" placeholder="Total">

            <br><br>

            <button id="submit" onclick="tambahTransaksi()">
                Bayar
            </button>
        </div>

        <!-- Tabel Riwayat Transaksi -->
        <div class="card">
            <h2>Riwayat Transaksi</h2>

            <table border="1" width="100%">
                <thead>
                    <tr>
                        <th>No</th>
                        <th>Pasien</th>
                        <th>Total</th>
                        <th>Status</th>
                        <th>Aksi</th>
                    </tr>
                </thead>

                <tbody id="tabelTransaksi">

                </tbody>
            </table>
        </div>
    </div>

    <script>
        let transaksi = [];
        let indexUpdate = -1;
        function tambahTransaksi() {
            let namaPasien =
                document.getElementById("namaPasien").value.trim();
            let totalBayar =
                document.getElementById("totalBayar").value;
            if (namaPasien === "" || totalBayar === "") {
                alert("Silakan isi semua data terlebih dahulu!");
                return;
            }
            if (indexUpdate !== -1) {
                transaksi[indexUpdate] = {
                    namaPasien,
                    totalBayar
                };
                indexUpdate = -1;
                document.getElementById("submit").innerText = "Bayar";
                alert("Data transaksi berhasil diupdate");
            } else {
                transaksi.push({
                    namaPasien,
                    totalBayar
                });
                alert("Pembayaran berhasil disimpan");
            }
            renderTable();
            document.getElementById("namaPasien").value = "";
            document.getElementById("totalBayar").value = "";
        }


        function renderTable() {
            let html = "";
            transaksi.forEach((item, index) => {
                html += `
                <tr>
                    <td>${index + 1}</td>
                    <td>${item.namaPasien}</td>
                    <td>Rp ${parseInt(item.totalBayar).toLocaleString('id-ID')}</td>
                    <td>Lunas</td>
                    <td>
                        <button onclick="updateTransaksi(${index})">
                            Update
                        </button>

                        <button onclick="deleteTransaksi(${index})">
                            Delete
                        </button>
                    </td>
                </tr>
                `;
            });
            document.getElementById("tabelTransaksi").innerHTML = html;
        }


        function deleteTransaksi(index) {
            let konfirmasi = confirm(
                `Yakin ingin menghapus transaksi pasien ${transaksi[index].namaPasien}?`
            );
            if (konfirmasi) {
                transaksi.splice(index, 1);
                renderTable();
                alert("Transaksi berhasil dihapus");
            }
        }


        function updateTransaksi(index) {
            document.getElementById("namaPasien").value = transaksi[index].namaPasien;
            document.getElementById("totalBayar").value = transaksi[index].totalBayar;
            indexUpdate = index;
            document.getElementById("submit").innerText = "Update";
        }

    </script>

</body>

</html>
