<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIMKES</title>
    <link rel="stylesheet" href="index.css" />
</head>

<body>

    <div class="sidebar">
        <h2>SIMKES</h2>
        <a href="index.html">Dashboard</a>
        <a href="pendaftaran.html">Pendaftaran</a>
        <a href="poli.html">Pemeriksaan Poli</a>
        <a href="farmasi.html">Farmasi</a>
        <a class="active" href="radiologi.html">Radiologi</a>
        <a href="laboratorium.html">Laboratorium</a>
        <a href="kasir.html">Kasir</a>
        <a href="login.html">Logout</a>
    </div>

    <div class="main">

        <!-- Form Radiologi -->
        <div class="card">
            <h2>Radiologi</h2>

            <input type="text"
                   id="namaPasien"
                   placeholder="Nama Pasien">

            <select id="pemeriksaan">
                <option value="X-Ray">X-Ray</option>
                <option value="CT Scan">CT Scan</option>
                <option value="MRI">MRI</option>
                <option value="USG">USG</option>
            </select>

            <textarea id="hasilLab"
                      class="hasil-labrad"
                      placeholder="Hasil Pemeriksaan"></textarea>

            <br><br>

            <button id="submit" onclick="simpanHasil()">
                Simpan Hasil
            </button>
        </div>


        <!-- Tabel Radiologi -->
        <div class="card">
            <h2>Data Pemeriksaan Radiologi</h2>

            <table border="1" width="100%">
                <thead>
                    <tr>
                        <th>No</th>
                        <th>Pasien</th>
                        <th>Pemeriksaan</th>
                        <th>Hasil</th>
                        <th>Aksi</th>
                    </tr>
                </thead>

                <tbody id="tabelLab">

                </tbody>
            </table>
        </div>

    </div>


    <script>

        let radiologi = localStorage.getItem('radiologi') ? JSON.parse(localStorage.getItem('radiologi')) : [];
        let indexUpdate = -1;
        function simpanHasil() {
            let namaPasien = document.getElementById("namaPasien").value.trim();
            let pemeriksaan = document.getElementById("pemeriksaan").value;
            let hasilLab = document.getElementById("hasilLab").value.trim();
            if (namaPasien === "" || hasilLab === "") {
                alert("Semua data harus diisi!");
                return;
            }
            if (indexUpdate !== -1) {
                radiologi[indexUpdate] = {
                    namaPasien,
                    pemeriksaan,
                    hasilLab
                };
                indexUpdate = -1;
                localStorage.setItem('radiologi', JSON.stringify(radiologi))
                document.getElementById("submit").innerText = "Simpan Hasil";
                alert("Data radiologi berhasil diupdate");
            } else {
                radiologi.push({
                    namaPasien,
                    pemeriksaan,
                    hasilLab
                });
                localStorage.setItem('radiologi', JSON.stringify(radiologi))
                alert("Data radiologi berhasil disimpan");
            }
            renderTable();
            document.getElementById("namaPasien").value = "";
            document.getElementById("pemeriksaan").selectedIndex = 0;
            document.getElementById("hasilLab").value = "";
        }


        function renderTable() {
            let html = "";
            radiologi.forEach((item, index) => {
                html += `
                <tr>
                    <td>${index + 1}</td>
                    <td>${item.namaPasien}</td>
                    <td>${item.pemeriksaan}</td>
                    <td>${item.hasilLab}</td>
                    <td>
                        <button onclick="updateHasil(${index})">
                            Update
                        </button>

                        <button onclick="deleteHasil(${index})">
                            Delete
                        </button>
                    </td>
                </tr>
                `;
            });
            document.getElementById("tabelLab").innerHTML = html;
        }


        function deleteHasil(index) {
            let konfirmasi = confirm(
                `Yakin ingin menghapus data radiologi pasien ${radiologi[index].namaPasien}?`
            );
            if (konfirmasi) {
                radiologi.splice(index, 1);
                localStorage.setItem('radiologi', JSON.stringify(radiologi))
                renderTable();
                alert("Data radiologi berhasil dihapus");
            }
        }


        function updateHasil(index) {
            document.getElementById("namaPasien").value = radiologi[index].namaPasien;
            document.getElementById("pemeriksaan").value = radiologi[index].pemeriksaan;
            document.getElementById("hasilLab").value = radiologi[index].hasilLab;
            indexUpdate = index;
            document.getElementById("submit").innerText = "Update";
        }
        renderTable()
    </script>

</body>

</html>
