<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIMKES</title>
    <link rel="stylesheet" href="index.css" />
</head>

<body>

    <div class="sidebar">
        <h2>SIMKES</h2>
        <a href="index.html">Dashboard</a>
        <a href="pendaftaran.html">Pendaftaran</a>
        <a class="active" href="poli.html">Pemeriksaan Poli</a>
        <a href="farmasi.html">Farmasi</a>
        <a href="radiologi.html">Radiologi</a>
        <a href="laboratorium.html">Laboratorium</a>
        <a href="kasir.html">Kasir</a>
        <a href="login.html">Logout</a>
    </div>

    <div class="main">

        <!-- Form Pemeriksaan -->
        <div class="card">
            <h2>Pemeriksaan Poli</h2>

            <input type="text" id="namaPasien" placeholder="Nama Pasien">
            <input type="text" id="diagnosa" placeholder="Diagnosa">
            <input type="text" id="tindakan" placeholder="Tindakan">

            <button onclick="simpanPemeriksaan()">Simpan Pemeriksaan</button>
        </div>

        <!-- Tabel Antrian Poli -->
        <div class="card">
            <h2>Antrian Poli</h2>

            <table border="1" width="100%">
                <thead>
                    <tr>
                        <th>No</th>
                        <th>Nama</th>
                        <th>Diagnosa</th>
                        <th>Tindakan</th>
                        <th>Status</th>
                    </tr>
                </thead>

                <tbody id="tabelPoli">
                    <tr>
                        <td>1</td>
                        <td>Budi</td>
                        <td>Demam</td>
                        <td>Pemberian Obat</td>
                        <td>Dipanggil</td>
                    </tr>
                </tbody>
            </table>
        </div>

    </div>

    <script>
        function simpanPemeriksaan() {

            let nama = document.getElementById("namaPasien").value;
            let diagnosa = document.getElementById("diagnosa").value;
            let tindakan = document.getElementById("tindakan").value;

            if (nama === "" || diagnosa === "" || tindakan === "") {
                alert("Semua data harus diisi!");
                return;
            }
            let tabel = document.getElementById("tabelPoli");
            let nomor = tabel.rows.length + 1;
            let barisBaru = `
                <tr>
                    <td>${nomor}</td>
                    <td>${nama}</td>
                    <td>${diagnosa}</td>
                    <td>${tindakan}</td>
                    <td>Dipanggil</td>
                </tr>
            `;

            tabel.innerHTML += barisBaru;
            document.getElementById("namaPasien").value = "";
            document.getElementById("diagnosa").value = "";
            document.getElementById("tindakan").value = "";
        }
    </script>

</body>

</html>
