<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIMKES</title>
    <link rel="stylesheet" href="index.css" />
</head>

<body>

    <div class="sidebar">
        <h2>SIMKES</h2>
        <a href="index.html">Dashboard</a>
        <a href="pendaftaran.html">Pendaftaran</a>
        <a class="active" href="poli.html">Pemeriksaan Poli</a>
        <a href="farmasi.html">Farmasi</a>
        <a href="radiologi.html">Radiologi</a>
        <a href="laboratorium.html">Laboratorium</a>
        <a href="kasir.html">Kasir</a>
        <a href="login.html">Logout</a>
    </div>

    <div class="main">

        <!-- Form Pemeriksaan -->
        <div class="card">
            <h2>Pemeriksaan Poli</h2>

            <input type="text" id="namaPasien" placeholder="Nama Pasien">

            <input type="text" id="diagnosa" placeholder="Diagnosa">

            <input type="text" id="tindakan" placeholder="Tindakan">

            <br><br>

            <button id="submit" onclick="simpanPemeriksaan()">
                Simpan Pemeriksaan
            </button>
        </div>

        <!-- Tabel Pemeriksaan -->
        <div class="card">
            <h2>Antrian Poli</h2>

            <table border="1" width="100%">
                <thead>
                    <tr>
                        <th>No</th>
                        <th>Nama</th>
                        <th>Diagnosa</th>
                        <th>Tindakan</th>
                        <th>Status</th>
                        <th>Aksi</th>
                    </tr>
                </thead>

                <tbody id="tabelPoli">

                </tbody>
            </table>
        </div>

    </div>

    <script>
        let pemeriksaan = [];
        let indexUpdate = -1;
        function simpanPemeriksaan() {
            let namaPasien = document.getElementById("namaPasien").value.trim();
            let diagnosa = document.getElementById("diagnosa").value.trim();
            let tindakan = document.getElementById("tindakan").value.trim();
            if (namaPasien === "" || diagnosa === "" || tindakan === "") {
                alert("Semua data harus diisi!");
                return;
            }
            if (indexUpdate !== -1) {
                pemeriksaan[indexUpdate] = {
                    namaPasien,
                    diagnosa,
                    tindakan
                };
                indexUpdate = -1;
                document.getElementById("submit").innerText =
                    "Simpan Pemeriksaan";
                alert("Data pemeriksaan berhasil diupdate");
            } else {
                pemeriksaan.push({
                    namaPasien,
                    diagnosa,
                    tindakan
                });
                alert("Data pemeriksaan berhasil disimpan");
            }
            renderTable();
            document.getElementById("namaPasien").value = "";
            document.getElementById("diagnosa").value = "";
            document.getElementById("tindakan").value = "";
        }


        function renderTable() {
            let html = "";
            pemeriksaan.forEach((item, index) => {
                html += `
                <tr>
                    <td>${index + 1}</td>
                    <td>${item.namaPasien}</td>
                    <td>${item.diagnosa}</td>
                    <td>${item.tindakan}</td>
                    <td>Dipanggil</td>
                    <td>
                        <button onclick="updatePemeriksaan(${index})">
                            Update
                        </button>

                        <button onclick="deletePemeriksaan(${index})">
                            Delete
                        </button>
                    </td>
                </tr>
                `;
            });
            document.getElementById("tabelPoli").innerHTML = html;
        }


        function deletePemeriksaan(index) {
            let konfirmasi = confirm(
                `Yakin ingin menghapus data pemeriksaan pasien ${pemeriksaan[index].namaPasien}?`
            );
            if (konfirmasi) {
                pemeriksaan.splice(index, 1);
                renderTable();
                alert("Data pemeriksaan berhasil dihapus");
            }
        }

        function updatePemeriksaan(index) {
            document.getElementById("namaPasien").value = pemeriksaan[index].namaPasien;
            document.getElementById("diagnosa").value = pemeriksaan[index].diagnosa;
            document.getElementById("tindakan").value = pemeriksaan[index].tindakan;
            indexUpdate = index;
            document.getElementById("submit").innerText = "Update";
        }
    </script>

</body>

</html>
