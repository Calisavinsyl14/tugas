<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIMKES</title>
    <link rel="stylesheet" href="index.css" />
</head>

<body>

    <div class="sidebar">
        <h2>SIMKES</h2>
        <a href="index.html">Dashboard</a>
        <a class="active" href="pendaftaran.html">Pendaftaran</a>
        <a href="poli.html">Pemeriksaan Poli</a>
        <a href="farmasi.html">Farmasi</a>
        <a href="radiologi.html">Radiologi</a>
        <a href="laboratorium.html">Laboratorium</a>
        <a href="kasir.html">Kasir</a>
        <a href="login.html">Logout</a>
    </div>

    <div class="main">
        <div class="card">
            <h2>Form Pendaftaran</h2>
            <input type="text" id="namaPasien" placeholder="Nama Pasien">
            <select id="poli">
                <option value="Poli Umum">Poli Umum</option>
                <option value="Poli Gigi">Poli Gigi</option>
            </select>
            <br><br>
            <button id="submit" onclick="submitRegister()">Simpan</button>
        </div>

        <div class="card">
            <h2>List Pendaftaran</h2>

            <table width="100%">
                <thead>
                    <tr>
                        <th>No</th>
                        <th>Nama</th>
                        <th>Poli</th>
                        <th>Status</th>
                        <th>Aksi</th>
                    </tr>
                </thead>

                <tbody id="tabelPendaftaran"></tbody>
            </table>
        </div>

    </div>

    <script>
        function simpanData() {
            let nama = document.getElementById("namaPasien").value;
            let poli = document.getElementById("poli").value;
            if (nama === "") {
                alert("Nama pasien harus diisi!");
                return;
            }

            let tabel = document.getElementById("tabelPendaftaran");
            let nomor = tabel.rows.length + 1;
            let barisBaru = `
                <tr>
                    <td>${nomor}</td>
                    <td>${nama}</td>
                    <td>${poli}</td>
                    <td><span class="badge wait">Menunggu</span></td>
                </tr>
            `;

            tabel.innerHTML += barisBaru;
            document.getElementById("namaPasien").value = "";
            document.getElementById("poli").selectedIndex = 0;
        }

        let pasien = localStorage.getItem('pasien') ? JSON.parse(localStorage.getItem('pasien')) : []
        let indexUpdate = -1
        function submitRegister() {
            let namaPasien = document.getElementById('namaPasien').value.trim()
            let poli = document.getElementById('poli').value
            if (namaPasien) {
                if (indexUpdate !== -1) {
                    pasien[indexUpdate] = {
                        namaPasien,
                        poli
                    }
                    localStorage.setItem('pasien', JSON.stringify(pasien))
                    document.getElementById('submit').innerText = 'simpan'
                    indexUpdate = -1
                    alert('Pasien Berhasil diupdate')
                } else {
                    pasien.push({
                        namaPasien,
                        poli
                    })
                    localStorage.setItem('pasien', JSON.stringify(pasien))
                    alert('Pasien Berhasil disimpan')
                }
                renderTable()
                document.getElementById('namaPasien').value = ''
                document.getElementById('poli').selectedIndex = 0
            } else {
                alert('Nama Pasien Wajib diisi')
            }
        }

        function renderTable() {
        let html = ''

        pasien.forEach((item, index) => {
            html += `
            <tr>
                <td>${index + 1}</td>
                <td>${item.namaPasien}</td>
                <td>${item.poli}</td>
                <td><span class="badge wait">Menunggu</span></td>
                <td>
                    <button onclick="updateRegister(${index})">Update</button>
                    <button onclick="deleteRegister(${index})">Delete</button>
                </td>
            </tr>
            `
        })
        document.getElementById('tabelPendaftaran').innerHTML = html
    }

       function deleteRegister(index) {
        let konfirmasi = confirm(
            `Yakin ingin menghapus pasien ${pasien[index].namaPasien}?`
        )

        if (konfirmasi) {
            pasien.splice(index, 1)
            localStorage.setItem('pasien', JSON.stringify(pasien))
            renderTable()
            alert('Pasien berhasil dihapus')
        }
    }

        function updateRegister(index) {
        document.getElementById('submit').innerText = 'Update'
        document.getElementById('namaPasien').value = pasien[index].namaPasien
        document.getElementById('poli').value = pasien[index].poli
        indexUpdate = index
    }
    renderTable()
    </script>

</body>

</html>
