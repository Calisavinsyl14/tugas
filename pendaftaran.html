<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIMKES</title>
    <link rel="stylesheet" href="index.css" />
</head>

<body>

    <div class="sidebar">
        <h2>SIMKES</h2>
        <a href="index.html">Dashboard</a>
        <a class="active" href="pendaftaran.html">Pendaftaran</a>
        <a href="poli.html">Pemeriksaan Poli</a>
        <a href="farmasi.html">Farmasi</a>
        <a href="radiologi.html">Radiologi</a>
        <a href="laboratorium.html">Laboratorium</a>
        <a href="kasir.html">Kasir</a>
        <a href="login.html">Logout</a>
    </div>

    <div class="main">

        <!-- Form Pendaftaran -->
        <div class="card">
            <h2>Form Pendaftaran</h2>

            <input type="text" id="namaPasien" placeholder="Nama Pasien">

            <select id="poli">
                <option value="Poli Umum">Poli Umum</option>
                <option value="Poli Gigi">Poli Gigi</option>
            </select>

            <br><br>

            <button onclick="simpanData()">Simpan</button>
        </div>

        <!-- Tabel Pendaftaran -->
        <div class="card">
            <h2>List Pendaftaran</h2>

            <table border="1" width="100%">
                <thead>
                    <tr>
                        <th>No</th>
                        <th>Nama</th>
                        <th>Poli</th>
                        <th>Status</th>
                    </tr>
                </thead>

                <tbody id="tabelPendaftaran">
                    <tr>
                        <td>1</td>
                        <td>Budi</td>
                        <td>Poli Umum</td>
                        <td><span class="badge wait">Menunggu</span></td>
                    </tr>

                    <tr>
                        <td>2</td>
                        <td>Siti</td>
                        <td>Poli Gigi</td>
                        <td><span class="badge done">Selesai</span></td>
                    </tr>
                </tbody>
            </table>
        </div>

    </div>

    <script>
        function simpanData() {

            let nama = document.getElementById("namaPasien").value;
            let poli = document.getElementById("poli").value;

            // Validasi
            if (nama === "") {
                alert("Nama pasien harus diisi!");
                return;
            }

            let tabel = document.getElementById("tabelPendaftaran");
            let nomor = tabel.rows.length + 1;
            let barisBaru = `
                <tr>
                    <td>${nomor}</td>
                    <td>${nama}</td>
                    <td>${poli}</td>
                    <td><span class="badge wait">Menunggu</span></td>
                </tr>
            `;

            tabel.innerHTML += barisBaru;
            document.getElementById("namaPasien").value = "";
            document.getElementById("poli").selectedIndex = 0;
        }
    </script>

</body>
</html>
