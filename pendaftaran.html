<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIMKES</title>
    <link rel="stylesheet" href="index.css" />
</head>

<body>
    <div class="sidebar">
        <h2>SIMKES</h2>
        <a href="index.html">Dashboard</a>
        <a class="active" href="pendaftaran.html">Pendaftaran</a>
        <a href="poli.html">Pemeriksaan Poli</a>
        <a href="farmasi.html">Farmasi</a>
        <a href="radiologi.html">Radiologi</a>
        <a href="farmasi.html">Laboratorium</a>
        <a href="kasir.html">Kasir</a>
        <a href="login.html">Logout</a>
    </div>
    <div class="main">

        <div class="card">
            <h2>Form Pendaftaran</h2>
            <input placeholder="Nama Pasien">
            <select>
                <option>Poli Umum</option>
                <option>Poli Gigi</option>
            </select>
            <br />
            <button>Simpan</button>
        </div>

        <div class="card">
            <h2>List Pendaftaran</h2>
            <table>
                <tr>
                    <th>No</th>
                    <th>Nama</th>
                    <th>Poli</th>
                    <th>Status</th>
                </tr>
                <tr>
                    <td>1</td>
                    <td>Budi</td>
                    <td>Umum</td>
                    <td><span class="badge wait">Menunggu</span></td>
                </tr>
                <tr>
                    <td>2</td>
                    <td>Siti</td>
                    <td>Gigi</td>
                    <td><span class="badge done">Selesai</span></td>
                </tr>
            </table>
        </div>

    </div>
</body>

</html>
