<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIMKES</title>
    <link rel="stylesheet" href="index.css" />
</head>

<body>

    <div class="sidebar">
        <h2>SIMKES</h2>
        <a href="index.html">Dashboard</a>
        <a href="pendaftaran.html">Pendaftaran</a>
        <a href="poli.html">Pemeriksaan Poli</a>
        <a href="farmasi.html">Farmasi</a>
        <a href="radiologi.html">Radiologi</a>
        <a class="active" href="laboratorium.html">Laboratorium</a>
        <a href="kasir.html">Kasir</a>
        <a href="login.html">Logout</a>
    </div>

    <div class="main">

        <!-- Form Laboratorium -->
        <div class="card">
            <h2>Laboratorium</h2>

            <input type="text" id="namaPasien" placeholder="Nama Pasien">

            <select id="pemeriksaan">
                <option value="Hematologi">Hematologi</option>
                <option value="Kimia Klinik">Kimia Klinik</option>
                <option value="Mikrobiologi">Mikrobiologi</option>
                <option value="Urinalisis">Urinalisis</option>
            </select>

            <textarea
                id="hasilPemeriksaan"
                class="hasil-labrad"
                placeholder="Hasil Pemeriksaan"></textarea>

            <br><br>

            <button id="submit" onclick="simpanHasil()">
                Simpan Hasil
            </button>
        </div>

        <!-- Tabel Data Laboratorium -->
        <div class="card">
            <h2>Daftar Laboratorium</h2>

            <table border="1" width="100%">
                <thead>
                    <tr>
                        <th>No</th>
                        <th>Pasien</th>
                        <th>Pemeriksaan</th>
                        <th>Hasil</th>
                        <th>Aksi</th>
                    </tr>
                </thead>

                <tbody id="tabelLaboratorium">

                </tbody>
            </table>
        </div>

    </div>

    <script>
        let laboratorium = localStorage.getItem('laboratorium') ? JSON.parse(localStorage.getItem('laboratorium')) : [];
        let indexUpdate = -1;
        function simpanHasil() {
            let namaPasien =
                document.getElementById("namaPasien").value.trim();
            let pemeriksaan =
                document.getElementById("pemeriksaan").value;
            let hasilPemeriksaan =
                document.getElementById("hasilPemeriksaan").value.trim();
            if (namaPasien === "" || hasilPemeriksaan === "") {
                alert("Semua data harus diisi!");
                return;
            }

            if (indexUpdate !== -1) {
                laboratorium[indexUpdate] = {
                    namaPasien,
                    pemeriksaan,
                    hasilPemeriksaan
                };

                indexUpdate = -1;
                localStorage.setItem('laboratorium', JSON.stringify(laboratorium))
                document.getElementById("submit").innerText = "Simpan Hasil";
                alert("Data laboratorium berhasil diupdate");

            } else {
                laboratorium.push({
                    namaPasien,
                    pemeriksaan,
                    hasilPemeriksaan
                });
                localStorage.setItem('laboratorium', JSON.stringify(laboratorium))
                alert("Data laboratorium berhasil disimpan");
            }
            renderTable();
            document.getElementById("namaPasien").value = "";
            document.getElementById("pemeriksaan").selectedIndex = 0;
            document.getElementById("hasilPemeriksaan").value = "";
        }


        function renderTable() {
            let html = "";
            laboratorium.forEach((item, index) => {
                html += `
                <tr>
                    <td>${index + 1}</td>
                    <td>${item.namaPasien}</td>
                    <td>${item.pemeriksaan}</td>
                    <td>${item.hasilPemeriksaan}</td>
                    <td>
                        <button onclick="updateHasil(${index})">
                            Update
                        </button>

                        <button onclick="deleteHasil(${index})">
                            Delete
                        </button>
                    </td>
                </tr>
                `;
            });
            document.getElementById("tabelLaboratorium").innerHTML = html;
        }


        function deleteHasil(index) {
            let konfirmasi = confirm(
                `Yakin ingin menghapus data laboratorium pasien ${laboratorium[index].namaPasien}?`
            );
            if (konfirmasi) {
                laboratorium.splice(index, 1);
                localStorage.setItem('laboratorium', JSON.stringify(laboratorium))
                renderTable();
                alert("Data laboratorium berhasil dihapus");
            }
        }


        function updateHasil(index) {
            document.getElementById("namaPasien").value = laboratorium[index].namaPasien;
            document.getElementById("pemeriksaan").value = laboratorium[index].pemeriksaan;
            document.getElementById("hasilPemeriksaan").value = laboratorium[index].hasilPemeriksaan;
            indexUpdate = index;
            document.getElementById("submit").innerText ="Update";
        }
        renderTable()
    </script>
</body>
</html>
