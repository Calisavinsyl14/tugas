<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIMKES</title>
    <link rel="stylesheet" href="index.css">
</head>

<body>
    <div class="sidebar">
        <h2>SIMKES</h2>
        <a href="index.html">Dashboard</a>
        <a href="pendaftaran.html">Pendaftaran</a>
        <a href="poli.html">Pemeriksaan Poli</a>
        <a class="active" href="farmasi.html">Farmasi</a>
        <a href="radiologi.html">Radiologi</a>
        <a href="laboratorium.html">Laboratorium</a>
        <a href="kasir.html">Kasir</a>
        <a href="login.html">Logout</a>
    </div>

    <div class="main">

        <div class="card">
            <h2>Resep & Farmasi</h2>

            <input type="text" id="namaPasien" placeholder="Nama Pasien">
            <input type="text" id="obat" placeholder="Obat">
            <input type="number" id="jumlah" placeholder="Jumlah">

            <button onclick="tambahObat()">Tambah Obat</button>
        </div>

        <div class="card">
            <h2>Daftar Resep</h2>

            <table border="1" width="100%">
                <thead>
                    <tr>
                        <th>Pasien</th>
                        <th>Obat</th>
                        <th>Qty</th>
                    </tr>
                </thead>

                <tbody id="tabelResep">
                    <tr>
                        <td>Budi</td>
                        <td>Paracetamol</td>
                        <td>10</td>
                    </tr>
                </tbody>
            </table>
        </div>

    </div>

    <script>
        function tambahObat() {

            let pasien = document.getElementById("namaPasien").value;
            let obat = document.getElementById("obat").value;
            let jumlah = document.getElementById("jumlah").value;

            if (pasien === "" || obat === "" || jumlah === "") {
                alert("Semua data harus diisi!");
                return;
            }

            let tabel = document.getElementById("tabelResep");
            let barisBaru = `
                <tr>
                    <td>${pasien}</td>
                    <td>${obat}</td>
                    <td>${jumlah}</td>
                </tr>
            `;

            tabel.innerHTML += barisBaru;
            document.getElementById("namaPasien").value = "";
            document.getElementById("obat").value = "";
            document.getElementById("jumlah").value = "";
        }
    </script>

</body>

</html>
