<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIMKES</title>
    <link rel="stylesheet" href="index.css">
</head>

<body>

    <div class="sidebar">
        <h2>SIMKES</h2>
        <a href="index.html">Dashboard</a>
        <a href="pendaftaran.html">Pendaftaran</a>
        <a href="poli.html">Pemeriksaan Poli</a>
        <a class="active" href="farmasi.html">Farmasi</a>
        <a href="radiologi.html">Radiologi</a>
        <a href="laboratorium.html">Laboratorium</a>
        <a href="kasir.html">Kasir</a>
        <a href="login.html">Logout</a>
    </div>

    <div class="main">

        <!-- Form Input -->
        <div class="card">
            <h2>Resep & Farmasi</h2>

            <input type="text" id="namaPasien" placeholder="Nama Pasien">
            <input type="text" id="obat" placeholder="Obat">
            <input type="number" id="jumlah" placeholder="Jumlah">

            <br><br>

            <button id="submit" onclick="tambahObat()">
                Tambah Obat
            </button>
        </div>

        <!-- Tabel Data -->
        <div class="card">
            <h2>Daftar Resep</h2>

            <table border="1" width="100%">
                <thead>
                    <tr>
                        <th>No</th>
                        <th>Pasien</th>
                        <th>Obat</th>
                        <th>Qty</th>
                        <th>Aksi</th>
                    </tr>
                </thead>

                <tbody id="tabelResep">

                </tbody>
            </table>
        </div>

    </div>

    <script>

        let resep = localStorage.getItem('resep') ? JSON.parse(localStorage.getItem('resep')) : [];
        let indexUpdate = -1;
        function tambahObat() {
            let namaPasien = document.getElementById("namaPasien").value.trim();
            let obat = document.getElementById("obat").value.trim();
            let jumlah = document.getElementById("jumlah").value;
            if (namaPasien === "" || obat === "" || jumlah === "") {
                alert("Semua data harus diisi!");
                return;
            }
            if (indexUpdate !== -1) {
                resep[indexUpdate] = {
                    namaPasien,
                    obat,
                    jumlah
                };
                indexUpdate = -1;
                localStorage.setItem('resep', JSON.stringify(resep))
                document.getElementById("submit").innerText = "Tambah Obat";
                alert("Data resep berhasil diupdate");

            } else {
                resep.push({
                    namaPasien,
                    obat,
                    jumlah
                });
                localStorage.setItem('resep', JSON.stringify(resep))
                alert("Data resep berhasil ditambahkan");
            }

            renderTable();
            document.getElementById("namaPasien").value = "";
            document.getElementById("obat").value = "";
            document.getElementById("jumlah").value = "";
        }


        function renderTable() {
            let html = "";
            resep.forEach((item, index) => {
                html += `
                <tr>
                    <td>${index + 1}</td>
                    <td>${item.namaPasien}</td>
                    <td>${item.obat}</td>
                    <td>${item.jumlah}</td>
                    <td>
                        <button onclick="updateObat(${index})">
                            Update
                        </button>

                        <button onclick="deleteObat(${index})">
                            Delete
                        </button>
                    </td>
                </tr>
                `;
            });
            document.getElementById("tabelResep").innerHTML = html;
        }


        function deleteObat(index) {

            let konfirmasi = confirm(
                `Yakin ingin menghapus resep milik ${resep[index].namaPasien}?`
            );
            if (konfirmasi) {
                resep.splice(index, 1);
                localStorage.setItem('resep', JSON.stringify(resep))
                renderTable();
                alert("Data resep berhasil dihapus");
            }
        }


        function updateObat(index) {
            document.getElementById("namaPasien").value = resep[index].namaPasien;
            document.getElementById("obat").value = resep[index].obat;
            document.getElementById("jumlah").value = resep[index].jumlah;
            indexUpdate = index;
            document.getElementById("submit").innerText = "Update";
        }
        renderTable()
    </script>

</body>

</html>
